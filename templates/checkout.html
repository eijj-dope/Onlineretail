<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="container mt-5">
    <h2>Checkout</h2>
    <div class="row">
        <!-- Shipping Info -->
        <div class="col-md-6">
            <div class="card shadow-sm p-4 mb-3">
                <h4>Shipping Information</h4>
                <form>
                    <input type="text" class="form-control mb-2" placeholder="Full Name" required>
                    <input type="text" class="form-control mb-2" placeholder="Address" required>
                    <input type="text" class="form-control mb-2" placeholder="City" required>
                    <input type="text" class="form-control mb-2" placeholder="ZIP Code" required>
                </form>
            </div>
        </div>
        <!-- Payment -->
        <div class="col-md-6">
            <div class="card shadow-sm p-4 mb-3">
                <h4>Payment</h4>
                <form>
                    <select class="form-select mb-2">
                        <option selected>Select Payment</option>
                        <option value="card">Credit/Debit Card</option>
                        <option value="cod">Cash on Delivery</option>
                    </select>
                    <input type="text" class="form-control mb-2" placeholder="Card Number">
                    <input type="text" class="form-control mb-2" placeholder="Expiry Date">
                    <input type="text" class="form-control mb-2" placeholder="CVV">
                </form>
            </div>
        </div>
    </div>

    <!-- Order Summary -->
    <div class="card shadow-sm p-4 mt-3">
        <h4>Order Summary</h4>
        <table class="table">
            <thead>
                <tr><th>Product</th><th>Qty</th><th>Price</th></tr>
            </thead>
            <tbody>
                {% for item in cart_items %}
                <tr>
                    <td>{{ item.name }}</td>
                    <td>{{ item.quantity }}</td>
                    <td>${{ item.price }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <div class="text-end mt-2">
            <h5>Total: ${{ total_price }}</h5>
            <button class="btn btn-success">Place Order</button>
        </div>
    </div>
</div>
</body>
</html>
