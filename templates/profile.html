{% extends "base.html" %}

{% block title %}Profile{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-lg border-0 p-4 mx-auto" style="max-width: 500px; border-radius: 16px;">
        
        <!-- Avatar -->
        <div class="text-center mb-3">
            <div style="
                width: 80px;
                height: 80px;
                border-radius: 50%;
                background: linear-gradient(135deg, #0d6efd, #0dcaf0);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 32px;
                color: white;
                margin: auto;
            ">
                👤
            </div>
            <h4 class="mt-3 mb-0">{{ session.user_name }}</h4>
            <small class="text-muted">Customer</small>
        </div>

        <hr>

        <!-- Info -->
        <div class="mb-2">
            <strong>User ID:</strong>
            <span class="float-end">{{ session.user_id }}</span>
        </div>

        <div class="mb-2">
            <strong>Role:</strong>
            <span class="float-end badge bg-primary">{{ session.role }}</span>
        </div>

        <hr>

        <!-- Actions -->
        <div class="d-grid gap-2 mt-3">
            <a href="/my_orders" class="btn btn-outline-primary">📦 My Orders</a>
            <a href="/cart" class="btn btn-outline-success">🛒 View Cart</a>
            <a href="/products" class="btn btn-dark">🛍 Continue Shopping</a>
        </div>

    </div>

</div>

{% endblock %}
