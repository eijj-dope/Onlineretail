{% extends "admin_base.html" %}

{% block content %}

<h2>Product Management</h2>

<form method="POST" action="/admin/add_product" enctype="multipart/form-data" class="mb-4">
    <div class="row g-2">
        <div class="col">
            <input name="name" class="form-control" placeholder="Name" required>
        </div>
        <div class="col">
            <input name="price" type="number" step="0.01" class="form-control" placeholder="Price" required>
        </div>
        <div class="col">
            <input name="stock" type="number" class="form-control" placeholder="Stock" required>
        </div>
        <div class="col">
            <input name="image" type="file" class="form-control" required>
        </div>
        <div class="col">
            <button class="btn btn-success w-100">Add</button>
        </div>
    </div>
</form>

<table class="table bg-white">
<tr>
    <th>Image</th>
    <th>Name</th>
    <th>Price</th>
    <th>Stock</th>
    <th>Action</th>
</tr>

{% for p in products %}
<tr>
    <td><img src="{{ url_for('static', filename='images/' + p.image) }}" width="60"></td>
    <td>{{ p.name }}</td>
    <td>${{ p.price }}</td>
    <td>{{ p.stock }}</td>
    <td>
        <a href="/admin/delete_product/{{ p.product_id }}" class="btn btn-danger btn-sm">Delete</a>
    </td>
</tr>
{% endfor %}
</table>

{% endblock %}
