{% extends "admin_base.html" %}

{% block content %}

<h2>Sales Dashboard</h2>

<div class="row mt-4">

    <div class="col-md-4">
        <div class="card p-4 shadow">
            <h5>Total Sales</h5>
            <h2 class="text-success">${{ total_sales or 0 }}</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-4 shadow">
            <h5>Total Orders</h5>
            <h2>{{ total_orders or 0 }}</h2>
        </div>
    </div>

</div>

<div class="card p-4 shadow mt-4">
    <h5>Sales Overview</h5>
    <div style="height:300px;">
        <canvas id="salesChart"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const labels = {{ dates or [] | tojson }};
const data = {{ totals or [] | tojson }};

new Chart(document.getElementById('salesChart'), {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'Sales',
            data: data,
            borderWidth: 2,
            tension: 0.3
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false
    }
});
</script>

{% endblock %}
