<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Online Store{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Your CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- 🔥 NAVBAR (ONE TIME ONLY) -->
<nav class="navbar navbar-dark bg-dark px-5">
    <a class="navbar-brand" href="/products">Online Store</a>

    <div>
        <a class="btn btn-light me-2" href="/products">Products</a>
        <a class="btn btn-light me-2" href="/cart">Cart</a>
        <a class="btn btn-light me-2" href="/my_orders">Orders</a>
        <a class="btn btn-light me-2" href="/profile">Profile</a>
        <a class="btn btn-light me-2" href="/logout">Logout</a>
    </div>
</nav>

<!-- 🔥 PAGE CONTENT -->
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
