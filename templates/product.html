<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='static/css/style.css') }}">
    <script src="{{ url_for('static', filename='static/js/script.js') }}"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/home">Online Store</a>
        <div>
            <a class="btn btn-light me-2" href="/cart">Cart</a>
            <a class="btn btn-light" href="/logout">Logout</a>
        </div>
    </div>
</nav>


<div class="container mt-5">
    <h2>Products</h2>
    <div class="row mt-4">
        {% for product in products %}
        <div class="col-md-3 mb-4">
            <div class="card shadow-sm h-100">
                <img src="/static/images/default.png" class="card-img-top" alt="Product Image">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ product.name }}</h5>
                    <p class="card-text">$ {{ product.price }}</p>
                    <div class="d-flex align-items-center mt-2">
                        <!-- Quantity input -->
                        <input type="number" 
                               id="qty-{{ product.product_id }}" 
                               value="1" 
                               min="1" 
                               max="{{ product.stock }}" 
                               class="form-control me-2" 
                               style="width: 70px;">
                    
                        <!-- Add to cart button -->
                        <button onclick="addToCart('{{ product.product_id }}')" 
                                class="btn btn-primary">
                            Add to Cart
                        </button>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
